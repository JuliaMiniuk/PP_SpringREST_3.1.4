<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        html, body {height: 100%;}
    </style>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <span sec:authentication="principal.username"></span> :
            <span sec:authentication="principal.authorities" var="authorities">
                <span th:each="auth : ${authorities}" th:text="${auth.authority} + ' '"></span>
            </span>
        </span>
<!--        <form th:action="@{/logout}"-->
<!--              method="post" class="ms-auto m-0">-->
<!--            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>-->
<!--        </form>-->
        <button type="button" id="logoutBtn" class="btn btn-secondary btn-sm">Logout</button>
    </div>
</nav>
<div class="container-fluid mt-4 h-100">
    <div class="row h-100">
        <div class="col-md-2 h-100 d-flex flex-column bg-light p-3">
            <div class="list-group flex-grow-1">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}"
                   class="list-group-item list-group-item-action active">Admin</a>
                <a sec:authorize="hasRole('USER')" th:href="@{/user}" class="list-group-item list-group-item-action">My
                    Page</a>
            </div>
        </div>
        <div class="col-md-10 h-100">
            <h1 class="display-4 mb-4">User information</h1>
            <div class="bg-light p-2 mb-3 border">
                <h4 class="mb-0">About user</h4>
            </div>
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Lastname</th>
                    <th>Age</th>
                    <th>Roles</th>
                </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/user-page.js"></script>
</body>
</html>
