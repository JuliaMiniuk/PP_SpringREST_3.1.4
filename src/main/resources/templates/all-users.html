<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        html, body {height: 100%;}
    </style>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <span sec:authentication="principal.username"></span> :
            <span sec:authentication="principal.authorities" var="authorities">
                <span th:each="auth : ${authorities}" th:text="${auth.authority} + ' '"></span>
            </span>
        </span>
<!--        <form th:action="@{/logout}"-->
<!--              method="post" class="ms-auto m-0">-->
<!--            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>-->
<!--        </form>-->
        <button type="button" id="logoutBtn" class="btn btn-secondary btn-sm">Logout</button>
    </div>
</nav>
<div class="container-fluid mt-4 h-100">
    <div class="row h-100">
        <div class="col-md-2 h-100 d-flex flex-column bg-light p-3">
            <div class="list-group flex-grow-1">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a sec:authorize="hasRole('USER')" th:href="@{/user}" class="list-group-item list-group-item-action">My
                    Page</a>
            </div>
        </div>
        <div class="col-md-10 h-100">
            <h1 class="display-4 mb-4">Admin panel</h1>
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users"
                            type="button" role="tab" aria-controls="users" aria-selected="true">Users table
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="newuser-tab" data-bs-toggle="tab" data-bs-target="#newuser"
                            type="button" role="tab" aria-controls="newuser" aria-selected="false">New User
                    </button>
                </li>
            </ul>
            <div class="tab-content" id="adminTabsContent">
                <div class="tab-pane fade show active" id="users" role="tabpanel" aria-labelledby="users-tab">
                    <div class="mt-3">
                        <h3>All Users</h3>
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Lastname</th>
                                <th>Age</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-pane fade" id="newuser" role="tabpanel" aria-labelledby="newuser-tab">
                    <div class="mt-3">
                        <h3>Add new user</h3>
                        <form id="createUserForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Lastname</label>
                                <input type="text" class="form-control" id="lastname" name="lastname" required>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" name="age" min="1">
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" >
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <div id="rolesCheckboxes"></div>
                            </div>
                                <button type="button" class="btn btn-success" id="createBtn">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="deleteModalLabel">Delete user</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="deleteUserId">
                        <p><strong>ID:</strong>
                            <span id="modal-userid"></span></p>
                        <p><strong>Username:</strong>
                            <span id="modal-username"></span></p>
                        <p><strong>Lastname:</strong>
                            <span id="modal-lastname"></span></p>
                        <p><strong>Age:</strong>
                            <span id="modal-age"></span></p>
                        <p><strong>Roles:</strong>
                            <span id="modal-roles"></span></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="updateModal" tabindex="-1" aria-labelledby="updateModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="updateModalLabel">Update user</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="updateUserId">
                            <p><strong>ID:</strong><span id="update-userid-display"></span></p>
                            <div class="mb-3">
                                <label for="update-username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="update-username" required/>
                            </div>
                            <div class="mb-3">
                                <label for="update-lastname" class="form-label">Lastname</label>
                                <input type="text" class="form-control" id="update-lastname" required/>
                            </div>
                            <div class="mb-3">
                                <label for="update-age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="update-age" min="1"/>
                            </div>
                            <div class="mb-3">
                                <label for="update-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="update-password"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <div id="updateRolesCheckboxes"></div>
                            </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" id="updateBtn">Update</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/users.js"></script>
</body>
</html>
