<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<div th:each="user : ${users}">
        <strong th:text="${user.username} + ' ' + ${user.lastname}"></strong>
        (Age: <span th:text="${user.age}"></span>)
    <form th:action="@{/update}" method="get" style="display:inline;">
        <input type="hidden"
               name="id" th:value="${user.id}" />
        <button type="submit"
                class="add">update</button>
    </form>
    <form th:action="@{/delete}" method="post" style="display:inline;">
        <input type="hidden"
               name="id" th:value="${user.id}" />
        <button type="submit"
                class="add">delete</button>
    </form>
</div>
<br>
<a th:href="@{/new}" class="add">addUser</a>
<br>
</body>
</html>
