<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        html, body {height: 100%;}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">
            <span sec:authentication="principal.username"></span> :
            <span sec:authentication="principal.authorities" var="authorities">
                <span th:each="auth : ${authorities}" th:text="${auth.authority} + ' '"></span>
            </span>
        </span>
        <form th:action="@{/logout}"
              method="post" class="ms-auto m-0">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container-fluid mt-4 h-100">
    <div class="row h-100">
        <div class="col-md-2 h-100 d-flex flex-column bg-light p-3">
            <div class="list-group flex-grow-1">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="list-group-item list-group-item-action active">Admin</a>
                <a sec:authorize="hasRole('USER')" th:href="@{/user}" class="list-group-item list-group-item-action">My
                    Page</a>
            </div>
        </div>
        <div class="col-md-10 h-100">
            <h1 class="display-4 mb-4">Admin panel</h1>
            <ul class="nav nav-tabs" id="adminTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users"
                            type="button" role="tab" aria-controls="users" aria-selected="true">Users table
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="newuser-tab" data-bs-toggle="tab" data-bs-target="#newuser"
                            type="button" role="tab" aria-controls="newuser" aria-selected="false">New User
                    </button>
                </li>
            </ul>
            <div class="tab-content" id="adminTabsContent">
                <div class="tab-pane fade show active" id="users" role="tabpanel" aria-labelledby="users-tab">
                    <div class="mt-3">
                        <h3>All Users</h3>
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Lastname</th>
                                <th>Age</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.lastname}"></td>
                                <td th:text="${user.age}"></td>
                                <td>
                            <span th:each="role, iterStat : ${user.roles}"
                                  th:text="${role.name} + (${iterStat.last} ? '' : ', ')"></span>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-primary btn-sm"
                                            data-bs-toggle="modal" data-bs-target="#updateModal"
                                            th:data-userid="${user.id}"
                                            th:data-username="${user.username}"
                                            th:data-lastname="${user.lastname}"
                                            th:data-age="${user.age}"
                                            th:data-password="${''}"
                                            th:data-roleids="${#strings.listJoin(user.roles.![id], ', ')}">Update
                                    </button>
                                    <button type="button" class="btn btn-danger btn-sm"
                                            data-bs-toggle="modal" data-bs-target="#deleteModal"
                                            th:data-userid="${user.id}"
                                            th:data-username="${user.username}"
                                            th:data-lastname="${user.lastname}"
                                            th:data-age="${user.age}"
                                            th:data-roles="${#strings.listJoin(user.roles.![name], ', ')}">Delete
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-pane fade" id="newuser" role="tabpanel" aria-labelledby="newuser-tab">
                    <div class="mt-3">
                        <h3>Add new user</h3>
                        <form th:action="@{/admin/save}" method="post" th:object="${user}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" th:field="*{username}" required />
                                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="lastname" class="form-label">Lastname</label>
                                <input type="text" class="form-control" id="lastname" th:field="*{lastname}" required />
                                <div class="text-danger" th:if="${#fields.hasErrors('lastname')}" th:errors="*{lastname}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" th:field="*{age}" min="1" />
                                <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}" required />
                                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <div th:each="role : ${roles}">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               th:id="'role-' + ${role.id}"
                                               name="roleIds" th:value="${role.id}" />
                                        <label class="form-check-label" th:for="'role-' + ${role.id}" th:text="${role.name}"></label>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-success">Add new user</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="deleteModalLabel">Delete user</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p><strong>ID:</strong>
                            <span id="modal-userid"></span></p>
                        <p><strong>Username:</strong>
                            <span id="modal-username"></span></p>
                        <p><strong>Lastname:</strong>
                            <span id="modal-lastname"></span></p>
                        <p><strong>Age:</strong>
                            <span id="modal-age"></span></p>
                        <p><strong>Roles:</strong>
                            <span id="modal-roles"></span></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <form id="deleteForm" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="updateModal" tabindex="-1" aria-labelledby="updateModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="updateModalLabel">Update user</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="updateForm" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <p><strong>ID:</strong><span id="update-userid-display"></span></p>
                            <div class="mb-3">
                                <label for="update-username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="update-username" name="username" required/>
                            </div>
                            <div class="mb-3">
                                <label for="update-lastname" class="form-label">Lastname</label>
                                <input type="text" class="form-control" id="update-lastname" name="lastname" required/>
                            </div>
                            <div class="mb-3">
                                <label for="update-age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="update-age" name="age" min="1"/>
                            </div>
                            <div class="mb-3">
                                <label for="update-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="update-password" name="password"/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Roles</label>
                                <div th:each="role : ${roles}">
                                    <div class="form-check">
                                        <input class="form-check-input update-role" type="checkbox"
                                               th:value="${role.id}" th:id="'update-role-' + ${role.id}" name="roleIds">
                                        <label class="form-check-label" th:for="'update-role-' + ${role.id}"
                                               th:text="${role.name}"></label>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" form="updateForm" class="btn btn-primary">Update</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const deleteModal = document.getElementById('deleteModal');
        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-userid');
            const username = button.getAttribute('data-username');
            const lastname = button.getAttribute('data-lastname');
            const age = button.getAttribute('data-age');
            const roles = button.getAttribute('data-roles');

            document.getElementById('modal-userid').textContent = userId;
            document.getElementById('modal-username').textContent = username;
            document.getElementById('modal-lastname').textContent = lastname;
            document.getElementById('modal-age').textContent = age;
            document.getElementById('modal-roles').textContent = roles;

            const form = document.getElementById('deleteForm');
            form.action = '/admin/delete/' + userId;
        });
    </script>
    <script>
        const updateModal = document.getElementById('updateModal');
        updateModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-userid');
            const username = button.getAttribute('data-username');
            const lastname = button.getAttribute('data-lastname');
            const age = button.getAttribute('data-age');
            const password = button.getAttribute('data-password');
            const roleIds = button.getAttribute('data-roleids');

            document.getElementById('update-userid-display').textContent = userId;
            document.getElementById('update-username').value = username;
            document.getElementById('update-lastname').value = lastname;
            document.getElementById('update-age').value = age;
            document.getElementById('update-password').value = '';

            const roleIdArray = roleIds ? roleIds.split(',') : [];
            document.querySelectorAll('.update-role').forEach(checkbox => {
                checkbox.checked = roleIdArray.includes(checkbox.value);
            });

            const form = document.getElementById('updateForm');
            form.action = '/admin/edit/' + userId;
        });
    </script>
</body>
</html>
